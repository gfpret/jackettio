services:
 jackettio_flaresolverr:
  container_name: jackettio_flaresolverr
  hostname: jackettio_flaresolverr
  image: flaresolverr/flaresolverr:latest
  ports:
   - 8191:8191
  environment:
   - LOG_LEVEL=${LOG_LEVEL:-info}
   - LOG_HTML=${LOG_HTML:-false}
   - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
  volumes:
   - /opt/jackettio/flaresolverr:/config
  networks:
   upcinternet:
    ipv4_address: 10.65.0.18
  restart: unless-stopped
  stdin_open: True
  tty: True

 jackettio_jackett:
  container_name: jackettio_jackett
  hostname: jackettio_jackett
  image: linuxserver/jackett:latest
  ports:
   - 9117:9117
  environment:
   - AUTO_UPDATE=true #optional
   - RUN_OPTS= #optional
  depends_on:
   - jackettio_flaresolverr
  volumes:
   - /opt/jackettio/jackett/config:/config
   - /opt/jackettio/jackett/downloads:/downloads
  networks:
   upcinternet:
    ipv4_address: 10.65.0.19
  restart: unless-stopped
  stdin_open: True
  tty: True

 jackettio:
  container_name: jackettio
  hostname: jackettio
  image: arvida42/jackettio:latest
  env_file:
   - /opt/jackettio/.env
  ports:
   - 4000:4000
  volumes:
   - /opt/jackettio/data:/data
  environment:
   - NODE_ENV=production
#   - CACHE_TYPE=redis
#   - REDIS_HOST=redis://10.65.0.17:6379
   - DATA_FOLDER=/data
  depends_on:
   - jackettio_jackett
  networks:
   upcinternet:
    ipv4_address: 10.65.0.20
  restart: unless-stopped
  stdin_open: True
  tty: True

networks:
 upcinternet:
  external: True
